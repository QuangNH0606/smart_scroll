name: smart_scroll
description: >-
  A Flutter pull-to-refresh and infinite scroll widget.
  Supports pull down to refresh, pull up to load more, pagination,
  custom indicators (Material, Cupertino, WaterDrop, Bezier),
  horizontal/vertical scrolling, and works with ListView, GridView, CustomScrollView.
version: 1.0.3
homepage: https://github.com/QuangNH0606/smart_scroll
repository: https://github.com/QuangNH0606/smart_scroll
issue_tracker: https://github.com/QuangNH0606/smart_scroll/issues

topics:
  - refresh
  - scroll
  - pagination
  - listview
  - loading

screenshots:
  - description: 'Basic pull-to-refresh and load more example'
    path: arts/example1.gif
  - description: 'WaterDrop refresh header indicator'
    path: arts/example2.gif
  - description: 'Reverse and horizontal scrolling'
    path: arts/example3.gif

environment:
  sdk: '>=3.3.4 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
