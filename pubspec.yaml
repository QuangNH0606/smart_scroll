name: smart_scroll
description: >-
  A powerful pull-to-refresh and infinite scroll (load more) pagination widget for Flutter. 
  A modern, high-performance alternative to flutter_pulltorefresh.
topics:
  - pull-to-refresh
  - infinite-scroll
  - pagination
  - load-more
  - scroll
  - refresh

screenshots:
  - description: 'Basic pull-to-refresh and load more example'
    path: arts/example1.gif
  - description: 'WaterDrop refresh header indicator'
    path: arts/example2.gif
  - description: 'Reverse and horizontal scrolling'
    path: arts/example3.gif

environment:
  sdk: '>=3.3.4 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
